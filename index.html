<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.5,user-scalable=yes">
<title>英语点读 - 常用词汇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0f0f13;color:#e8e8ed;min-height:100vh;padding-bottom:80px}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 16px 10px;position:sticky;top:0;z-index:10}
.header h1{font-size:17px;font-weight:600;color:#fff;text-align:center}
.header h1 span{color:#61dafb;font-weight:700}
.search-wrap{position:relative;max-width:500px;margin:8px auto 0}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border-radius:10px;border:1px solid #2a2a40;background:#1a1a2e;color:#e8e8ed;font-size:14px;outline:none}
.search-wrap input:focus{border-color:#61dafb}
.search-wrap .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#666;font-size:15px}
.tabs{display:flex;gap:4px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;background:#0f0f13;position:sticky;top:96px;z-index:9;border-bottom:1px solid #1a1a2e}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 12px;border-radius:14px;background:#1a1a2e;color:#888;font-size:12px;border:1px solid #2a2a40;cursor:pointer;transition:all .2s}
.tab.active{background:#61dafb22;color:#61dafb;border-color:#61dafb}
.count-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px 4px;font-size:12px;color:#666;background:#0f0f13}
.list{padding:6px 12px 100px;max-width:660px;margin:0 auto}
.word{display:flex;align-items:center;padding:11px 12px;margin-bottom:5px;border-radius:10px;background:#1a1a2e;border:1px solid #2a2a40;cursor:pointer;transition:all .1s}
.word:active{transform:scale(0.97);background:#222240}
.word .en{flex:1;font-size:15px;font-weight:500;color:#fff}
.word .zh{font-size:12px;color:#888;margin-right:10px;text-align:right;max-width:42%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.word .play{width:30px;height:30px;border-radius:50%;background:#61dafb22;border:1px solid #61dafb44;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.word .play svg{width:13px;height:13px;fill:#61dafb}
.word .play.playing{background:#61dafb;animation:pulse .35s}
.word .play.playing svg{fill:#1a1a2e}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
.empty{text-align:center;padding:60px 20px;color:#555;font-size:14px}
#unlock-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f0f13;z-index:99;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;transition:opacity .5s}
#unlock-overlay.hidden{opacity:0;pointer-events:none}
#unlock-overlay .icon{font-size:48px;margin-bottom:20px}
#unlock-overlay p{color:#888;font-size:14px;line-height:1.6;margin-bottom:20px}
#unlock-btn{padding:14px 40px;border-radius:25px;background:#61dafb;color:#0f0f13;font-size:16px;font-weight:600;border:none;cursor:pointer}
</style>
</head>
<body>

<div id="unlock-overlay">
  <div class="icon">🔊</div>
  <p>点击按钮激活语音功能<br>即可开始英语词汇学习</p>
  <button id="unlock-btn">🎧 开始学习</button>
</div>

<div class="header">
  <h1>📖 常用英语<span>点读</span></h1>
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input id="search" type="text" placeholder="搜索英文或中文…" autocomplete="off">
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="count-bar">
  <span>共 <span id="total-num">0</span> 词</span>
  <span id="cat-info">全部</span>
</div>

<div class="list" id="list"></div>

<script>
var WORDS = [

  ['Tool','工具','日常'],

  ['Update','更新','日常'],

  ['Install','安装','日常'],
  ['Path','路径','日常'],
  ['Directory','目录','日常'],
  ['File','文件','日常'],
  ['Command','命令','日常'],
  ['Terminal','终端','日常'],
  ['Log','日志','日常'],
  ['Default','默认','日常'],
  ['Enable','启用','日常'],
  ['Disable','禁用','日常'],

  ['Cancel','取消','日常'],

  ['Output','输出','日常'],
  ['API','接口','日常'],
  ['Token','代币','日常'],
  ['Response','回复','日常'],
  ['Prompt','提示词','日常'],
  ['Link','链接','日常'],
  ['URL','网址','日常'],
  ['Repo','仓库','日常'],
  ['Repository','代码仓库','日常'],
  ['Framework','框架','日常'],
  ['Backup','备份','日常'],
  ['Cache','缓存','日常'],
  ['Generate','生成','日常'],
  ['Download','下载','日常'],
  ['Upload','上传','日常'],
  ['Search','搜索','日常'],
  ['Filter','筛选','日常'],
  ['Git','版本管理','日常'],
  ['Project','项目','UE'],
  ['Build','构建','UE'],
  ['Compile','编译','UE'],
  ['Asset','资源','UE'],
  ['Blueprint','蓝图','UE'],
  ['Plugin','插件','UE'],
  ['Module','模块','UE'],
  ['Component','组件','UE'],
  ['Actor','Actor/对象','UE'],
  ['Class','类','UE'],
  ['Function','函数','UE'],

  ['VRAM','显存','ComfyUI'],
];

var CAT_ICONS = {"日常": "🤖", "UE": "🎮", "短剧": "📝", "团队": "🏢", "ComfyUI": "🎨"};

var _audioUnlocked = false;
var currentCat = '';
var _speaking = false;
var _currentAudio = null;

function unlockAudio() {
  if (_audioUnlocked) return;
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
  } catch(e) {}
  try {
    speechSynthesis.getVoices();
    var w = new SpeechSynthesisUtterance(' ');
    w.volume = 0;
    speechSynthesis.speak(w);
  } catch(e) {}
  _audioUnlocked = true;
  document.getElementById('unlock-overlay').classList.add('hidden');
}

function stopAudio() {
  if (_currentAudio) {
    try { _currentAudio.pause(); _currentAudio.currentTime = 0; } catch(e) {}
    _currentAudio = null;
  }
  try { speechSynthesis.cancel(); } catch(e) {}
}

function speakWord(word, btnEl) {
  if (!word || _speaking) return;
  _speaking = true;
  stopAudio();

  if (btnEl) {
    var playing = document.querySelectorAll('.play.playing');
    for (var i = 0; i < playing.length; i++) {
      playing[i].classList.remove('playing');
    }
    btnEl.classList.add('playing');
  }

  tryBaidu(word, btnEl);
}

function tryBaidu(word, btnEl) {
  var url = 'https://fanyi.baidu.com/gettts?lan=en&text=' + encodeURIComponent(word) + '&spd=3&source=web';
  try {
    var a = new Audio(url);
    _currentAudio = a;
    a.volume = 1;
    var p = a.play();

    var fallbackTimer = setTimeout(function() {
      if (_currentAudio === a) {
        tryBaiduFallback(word, btnEl);
      }
    }, 2000);

    a.onended = function() {
      clearTimeout(fallbackTimer);
      _speaking = false;
      _currentAudio = null;
      if (btnEl) btnEl.classList.remove('playing');
    };

    a.onerror = function() {
      clearTimeout(fallbackTimer);
      if (_currentAudio === a) {
        tryYoudao(word, btnEl);
      }
    };

    if (p && p.catch) {
      p.catch(function() {
        clearTimeout(fallbackTimer);
        if (_currentAudio === a) {
          tryYoudao(word, btnEl);
        }
      });
    }
  } catch(e) {
    tryYoudao(word, btnEl);
  }
}

function tryBaiduFallback(word, btnEl) {
  if (_currentAudio) {
    try { _currentAudio.pause(); _currentAudio.currentTime = 0; } catch(e) {}
  }
  tryYoudao(word, btnEl);
}

function tryYoudao(word, btnEl) {
  var url = 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(word) + '&type=1';
  try {
    var a = new Audio(url);
    _currentAudio = a;
    a.volume = 1;
    var p = a.play();

    var fallbackTimer = setTimeout(function() {
      if (_currentAudio === a) {
        tryBrowser(word, btnEl);
      }
    }, 2000);

    a.onended = function() {
      clearTimeout(fallbackTimer);
      _speaking = false;
      _currentAudio = null;
      if (btnEl) btnEl.classList.remove('playing');
    };

    a.onerror = function() {
      clearTimeout(fallbackTimer);
      if (_currentAudio === a) {
        tryBrowser(word, btnEl);
      }
    };

    if (p && p.catch) {
      p.catch(function() {
        clearTimeout(fallbackTimer);
        if (_currentAudio === a) {
          tryBrowser(word, btnEl);
        }
      });
    }
  } catch(e) {
    tryBrowser(word, btnEl);
  }
}

function tryBrowser(word, btnEl) {
  try {
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(word);
    u.lang = 'en-US';
    u.rate = 0.9;
    u.onend = function() {
      _speaking = false;
      if (btnEl) btnEl.classList.remove('playing');
    };
    u.onerror = function() {
      _speaking = false;
      if (btnEl) btnEl.classList.remove('playing');
    };
    speechSynthesis.speak(u);
  } catch(e) {
    _speaking = false;
    if (btnEl) btnEl.classList.remove('playing');
  }
}

function render(cat, searchTerm) {
  currentCat = cat;
  var list = document.getElementById('list');
  var info = document.getElementById('cat-info');
  var total = document.getElementById('total-num');

  var filtered;
  if (searchTerm) {
    var s = searchTerm.toLowerCase();
    filtered = [];
    for (var i = 0; i < WORDS.length; i++) {
      var d = WORDS[i];
      if (d[0].toLowerCase().indexOf(s) !== -1 || d[1].indexOf(s) !== -1) {
        filtered.push(d);
      }
    }
    total.textContent = filtered.length;
    info.textContent = '🔍 "' + searchTerm + '"';
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">😕 未找到匹配单词</div>';
      return;
    }
  } else if (cat) {
    filtered = [];
    for (var i = 0; i < WORDS.length; i++) {
      if (WORDS[i][2] === cat) {
        filtered.push(WORDS[i]);
      }
    }
    total.textContent = filtered.length;
    info.textContent = CAT_ICONS[cat] + ' ' + cat;
  } else {
    filtered = WORDS;
    total.textContent = WORDS.length;
    info.textContent = '全部';
  }

  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var d = filtered[i];
    html += '<div class="word" data-word="' + d[0].replace(/'/g, "\\'") + '">';
    html += '<div class="en">' + d[0] + '</div>';
    html += '<div class="zh">' + d[1] + '</div>';
    html += '<div class="play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>';
  }
  list.innerHTML = html;

  if (!searchTerm) {
    var tabs = document.querySelectorAll('.tab');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].classList.toggle('active', tabs[i].dataset.cat === cat);
    }
  }
}

function init() {
  // Build category tabs
  var catSet = {};
  for (var i = 0; i < WORDS.length; i++) {
    catSet[WORDS[i][2]] = true;
  }
  var catList = Object.keys(catSet);

  var tabsHtml = '<div class="tab active" data-cat="">全部</div>';
  for (var i = 0; i < catList.length; i++) {
    var c = catList[i];
    var icon = CAT_ICONS[c] || '';
    tabsHtml += '<div class="tab" data-cat="' + c + '">' + icon + ' ' + c + '</div>';
  }
  document.getElementById('tabs').innerHTML = tabsHtml;
  document.getElementById('total-num').textContent = WORDS.length;

  render('', '');

  // Tab click
  document.getElementById('tabs').addEventListener('click', function(e) {
    var tab = e.target.closest('.tab');
    if (!tab) return;
    document.getElementById('search').value = '';
    render(tab.dataset.cat, '');
  });

  // Search
  document.getElementById('search').addEventListener('input', function() {
    render(currentCat, this.value.trim());
  });

  // Word click
  document.getElementById('list').addEventListener('click', function(e) {
    var wordEl = e.target.closest('.word');
    if (!wordEl) return;
    speakWord(wordEl.dataset.word, wordEl.querySelector('.play'));
  });

  // Unlock
  var unlockBtn = document.getElementById('unlock-btn');
  if (unlockBtn) {
    unlockBtn.addEventListener('click', unlockAudio);
  }
  document.addEventListener('touchstart', function() {
    if (!_audioUnlocked) unlockAudio();
  }, {once:true});
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
